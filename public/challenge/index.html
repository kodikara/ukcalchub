<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Challenge</title>
    <script type="text/javascript">
        // 1. Get the puzzle data from the current link
        const urlParams = new URLSearchParams(window.location.search);
        const p = urlParams.get('p');
        const s = urlParams.get('s');
        const d = urlParams.get('d') || 'MEDIUM';

        if (p && s) {
            // 2. Try to "kick" the user into the App using the custom scheme
            window.location.href = `sudoku://challenge?p=${p}&s=${s}&d=${d}`;
        }

        // 3. Fallback: If the app doesn't open within 1.5 seconds, go to Play Store
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=chamara.sudoku.ovein";
        }, 1500);
    </script>
</head>
<body>
    <p style="text-align:center; font-family:sans-serif; margin-top:50px;">
        Opening Sudoku Challenge...
    </p>
</body>
</html>
