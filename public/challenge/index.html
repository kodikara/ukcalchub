<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Challenge</title>
    <script type="text/javascript">
        // 1. Get the puzzle data from the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const p = urlParams.get('p');
        const s = urlParams.get('s');
        const d = urlParams.get('d') || 'MEDIUM';

        if (p && s) {
            // 2. Try to open the app using the "Intent" format (Most reliable for Android)
            // This forces the app to open and carries the data (p, s, d)
            const intentUrl = `intent://challenge?p=${p}&s=${s}&d=${d}#Intent;scheme=sudoku;package=chamara.sudoku.ovein;end`;
            window.location.href = intentUrl;
        }

        // 3. Fallback: If the app doesn't open in 2 seconds, go to Play Store
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=chamara.sudoku.ovein&pcampaignid=web_share";
        }, 2000);
    </script>
</head>
<body>
    <p style="text-align:center; font-family:sans-serif; margin-top:50px;">
        Opening Sudoku Challenge...
    </p>
</body>
</html>
