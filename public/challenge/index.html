<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Offline Challenge</title>
    <!-- Social Media Preview (WhatsApp/Facebook) -->
    <meta property="og:title" content="Sudoku Offline Challenge" />
    <meta property="og:description" content="I challenge you to solve this Sudoku puzzle! Can you beat it?" />
    <meta property="og:type" content="website" />

    <script type="text/javascript">
        // If the browser reaches this script, it means the app is NOT installed
        // (because the app would have intercepted the link before the browser opened).
        
        // We redirect to the Play Store, and we keep your campaign ID.
        var playStoreUrl = "https://play.google.com/store/apps/details?id=chamara.sudoku.ovein&pcampaignid=web_share";
        
        // Redirect immediately
        window.location.href = playStoreUrl;
    </script>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Redirecting to Sudoku Offline on Play Store...
    </p>
</body>
</html>
